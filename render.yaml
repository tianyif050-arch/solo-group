services:
  - type: web
    name: solo-group-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn fastapi_app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TTS_ENABLED
        value: "true"

  - type: web
    name: solo-group-ws
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-render.txt
    startCommand: python -m group_interview_demo.server --host 0.0.0.0 --port $PORT --mode llm --no-asr
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CORS_ALLOW_ORIGINS
        value: https://tianyif050-arch.github.io
